<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45">
  <!-- White Bishop -->
  <g fill="#EBECD0" stroke="#312E2B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Base -->
    <rect x="9" y="33" width="27" height="5" rx="2.5"/>
    <!-- Neck collar -->
    <rect x="13" y="29" width="19" height="5" rx="2"/>
    <!-- Body -->
    <ellipse cx="22.5" cy="22" rx="9" ry="9"/>
    <!-- Neck -->
    <ellipse cx="22.5" cy="15" rx="4" ry="5"/>
    <!-- Ball top -->
    <circle cx="22.5" cy="9" r="3"/>
    <!-- Cross/Pin on top -->
    <circle cx="22.5" cy="5.5" r="2" fill="#739552" stroke="#312E2B" stroke-width="1"/>
    <!-- Slash line on body -->
    <path d="M16 26 L29 26" stroke-width="1.2" stroke="#8B8987"/>
  </g>
  <g fill="none" stroke="#739552" stroke-width="0.8">
    <circle cx="22.5" cy="22" r="5"/>
  </g>
</svg>
