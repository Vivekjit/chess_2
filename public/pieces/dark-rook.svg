<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45">
  <!-- Dark Rook -->
  <g fill="#312E2B" stroke="#EBECD0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Base -->
    <rect x="8" y="33" width="29" height="5" rx="2"/>
    <!-- Shaft -->
    <rect x="12" y="16" width="21" height="18" rx="1"/>
    <!-- Battlements top -->
    <rect x="8"  y="10" width="7"  height="8" rx="1"/>
    <rect x="19" y="10" width="7"  height="8" rx="1"/>
    <rect x="30" y="10" width="7"  height="8" rx="1"/>
    <!-- Top connector -->
    <rect x="8" y="16" width="29" height="3"/>
  </g>
  <!-- Window slit detail -->
  <g fill="#EBECD0" stroke="none">
    <rect x="20" y="22" width="5" height="8" rx="1"/>
  </g>
</svg>
